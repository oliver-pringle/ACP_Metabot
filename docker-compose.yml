services:
  acp-metabot-api:
    build:
      context: ./ACP_Metabot.Api
    container_name: acp-metabot-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Sqlite=Data Source=/data/acp_metabot.db;Cache=Shared
      # Marketplace source: "acp-api" (live upstream) or "json-file" (offline seed).
      - Indexer__Source=acp-api
      - Indexer__SourcePath=/data/seed/offerings.json
      - Indexer__ApiBaseUrl=https://acpx.virtuals.io/
      - Indexer__ApiPageSize=100
      - Indexer__ApiRequestDelayMs=50
      - Indexer__IntervalSeconds=120
      - Embeddings__Provider=voyage
      - Embeddings__Model=voyage-finance-2
      # OPTIONAL fallback embedding provider. When enabled, ChainedEmbeddingProvider
      # tries Voyage first; on transient failure (rate limit / network / 5xx)
      # it falls back to Cohere embed-english-v3.0 (same 1024 dim). Search-path
      # query embedding still goes through Voyage only. See acp-v2 plan /
      # CohereEmbeddingProvider.cs for the cross-model search caveat.
      - Embeddings__Fallback__Enabled=${EMBEDDINGS_FALLBACK_ENABLED:-false}
      - Embeddings__Fallback__Model=${EMBEDDINGS_FALLBACK_MODEL:-embed-english-v3.0}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - Indexer__EmbeddingConcurrency=64
      - Claude__Model=claude-sonnet-4-6
      # Required — supply at deploy time
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      # Reputation v2 — Base mainnet RPC + ACP V2 contract. Without these the
      # container fails to start (eager DI for the ReputationWarmer hosted
      # service pulls in ChainEventScanner, which throws at construction).
      - BASE_RPC_URL=${BASE_RPC_URL}
      # Optional: separate RPC for the V2 seller enumeration scan (unfiltered
      # eth_getLogs on the V2 contract). publicnode rejects this query shape
      # with "request timed out"; Coinbase's official mainnet.base.org and
      # paid Alchemy/QuickNode all handle it. When unset, falls back to
      # BASE_RPC_URL above.
      - BASE_RPC_URL_ENUM=${BASE_RPC_URL_ENUM:-}
      - ACP_CONTRACT_ADDRESS_BASE=${ACP_CONTRACT_ADDRESS_BASE:-0x238E541BfefD82238730D00a2208E5497F1832E0}
      # ReputationWarmer: top-N agent_job_count agents, computed at 02:30 UTC.
      # Concurrency default in code is 4; lowered here to 1 because parallel
      # eth_getLogs against publicnode trips 429s (RPC rate limit) and the
      # warmer's daily pass only completes 2-8 agents before stalling.
      # mainnet.base.org (Coinbase) has higher limits but we keep concurrency=1
      # as a defence in depth. Bump back up if we move to paid RPC.
      - Reputation__WarmerConcurrency=${REPUTATION_WARMER_CONCURRENCY:-1}
      # X-Forwarded-* trust list. ForwardedHeaders middleware only honours these
      # headers from peers inside one of these CIDRs; everyone else's headers are
      # ignored (RemoteIpAddress falls back to the direct connection). Default to
      # the pinned acp-metabot bridge subnet so per-IP rate limits partition on
      # the real client IP forwarded by Caddy. Set to "" to disable entirely.
      - TRUSTED_PROXY_NETWORKS=${TRUSTED_PROXY_NETWORKS:-172.28.0.0/16}
      # Restrict the Host header allowlist. Caddy's default reverse_proxy
      # preserves the original Host header, so the public domain must be in
      # the list along with the internal service name (sidecar + cross-bot
      # acp-shared callers) and localhost (probes / dotnet run).
      # ACP_METABOT_DOMAIN matches the var Caddy uses for its certificate;
      # update both together if the public hostname changes.
      - AllowedHosts=${ACP_METABOT_DOMAIN:-localhost};acp-metabot-api;localhost
      # Cross-bot client to ACP_ChainlinkBot (Chainlink Functions hire +
      # reputation-as-feed publisher). Reaches the sibling bot over the
      # acp-shared external bridge. The API key is ACP_ChainlinkBot's own
      # INTERNAL_API_KEY exposed here under a disambiguated env var so each
      # bot's own INTERNAL_API_KEY stays distinct.
      - TheChainlinkBot__BaseUrl=http://acp-chainlinkbot-api:5000/
      - TheChainlinkBot__ApiKey=${THECHAINLINKBOT_API_KEY:-}
      # v1.6 #1 v0.1 reputation-as-Chainlink-feed publisher. Default OFF.
      # Enable by setting FEEDS_ENABLED=true in the root .env AND ensuring
      # ChainlinkBot is reachable on the acp-shared bridge. Picks top-N
      # cached-reputation agents daily at FEEDS_HOUR_UTC and asks ChainlinkBot
      # to deploy (or fetch) an AggregatorV3 feed per agent. Idempotent.
      - Feeds__Enabled=${FEEDS_ENABLED:-false}
      - Feeds__HourUtc=${FEEDS_HOUR_UTC:-5}
      - Feeds__TopN=${FEEDS_TOP_N:-50}
      - Feeds__MinScore=${FEEDS_MIN_SCORE:-50}
      - Feeds__BatchSize=${FEEDS_BATCH_SIZE:-5}
      # v1.6 #1 v0.2 — hourly sync worker that polls ChainlinkBot's
      # /v1/feed/{agent}/score for each published feed and refreshes Metabot's
      # reputation_feeds.last_pushed_round + last_pushed_at columns. Mirror of
      # ChainlinkBot's ScoringPushWorker activity. Default OFF; enable AFTER
      # v0.1 publish has deployed feeds.
      - Feeds__Sync__Enabled=${FEEDS_SYNC_ENABLED:-false}
      - Feeds__Sync__IntervalMinutes=${FEEDS_SYNC_INTERVAL_MINUTES:-60}
      - Feeds__Sync__BatchSize=${FEEDS_SYNC_BATCH_SIZE:-5}
      - Feeds__Sync__MaxAgents=${FEEDS_SYNC_MAX_AGENTS:-500}
      # M8 self-watch — Metabot pulls its OWN reputation from ChainlinkBot
      # on every sync tick and warns loudly if it drops below the threshold.
      # Set OwnAgentAddress to the Privy smart-account address of TheMetaBot
      # on app.virtuals.io. Unset → self-watch disabled.
      - Feeds__Sync__OwnAgentAddress=${FEEDS_SYNC_OWN_ADDRESS:-}
      - Feeds__Sync__OwnScoreThreshold=${FEEDS_SYNC_OWN_THRESHOLD:-30}
      # v1.7 Bundle A — Arena indexer. Off until ArenaBot is reachable on
      # acp-shared. Set ARENA_BASE_URL + ARENA_WORKER_ENABLED=true in the
      # root .env, then `docker compose up -d acp-metabot-api`. Worker
      # polls ArenaBot's free /v1/resources/* on a 15-min default cadence
      # and upserts agent_arena_participation.
      - Arena__BaseUrl=${ARENA_BASE_URL:-}
      - Arena__Worker__Enabled=${ARENA_WORKER_ENABLED:-false}
      - Arena__Worker__IntervalSeconds=${ARENA_WORKER_INTERVAL_SECONDS:-900}
    volumes:
      # Bind-mount must be writable by UID 1654 (the .NET 10 `app` user).
      # One-time setup on a fresh host: `mkdir -p data && sudo chown 1654:1654 data`.
      # Existing deployments must run the chown before redeploying with the
      # non-root container or the API will crash with EACCES on first write.
      - ./data:/data
    networks: [acp-metabot, acp-shared]
    # No ports published — only the sidecar talks to it.
    # acp-shared lets sibling bots (e.g. ACP_DeFiEval deep-eval) reach this API
    # at http://acp-metabot-api:5000 for cross-bot reputation lookups.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  acp-metabot-acp:
    build:
      context: ./acp-v2
    container_name: acp-metabot-acp
    restart: unless-stopped
    depends_on:
      acp-metabot-api:
        condition: service_healthy
    env_file: ./acp-v2/.env
    environment:
      - ACP_METABOT_API_URL=http://acp-metabot-api:5000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    networks: [acp-metabot]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # Public HTTPS gateway. Terminates TLS via Let's Encrypt, reverse-proxies to
  # the C# API's /v1/* endpoints (rate-limited, no X-API-Key). Set
  # ACP_METABOT_DOMAIN=api.your-domain.tld in the root .env to activate;
  # without it Caddy falls back to a localhost cert and is silent.
  acp-metabot-caddy:
    image: caddy:2-alpine
    container_name: acp-metabot-caddy
    restart: unless-stopped
    depends_on:
      acp-metabot-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - ACP_METABOT_DOMAIN=${ACP_METABOT_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [acp-metabot]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  acp-metabot:
    driver: bridge
    # Pinned subnet so the C# API can be configured to trust X-Forwarded-* only
    # from this range (Caddy lives here). Match TRUSTED_PROXY_NETWORKS above.
    # Recreating an existing bridge will trigger one `docker compose down/up`
    # cycle on first deploy of this version.
    ipam:
      config:
        - subnet: 172.28.0.0/16
  acp-shared:
    external: true

volumes:
  caddy_data:
  caddy_config:
