services:
  acp-metabot-api:
    build:
      context: ./ACP_Metabot.Api
    container_name: acp-metabot-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Sqlite=Data Source=/data/acp_metabot.db;Cache=Shared
      # Marketplace source: "acp-api" (live upstream) or "json-file" (offline seed).
      - Indexer__Source=acp-api
      - Indexer__SourcePath=/data/seed/offerings.json
      - Indexer__ApiBaseUrl=https://acpx.virtuals.io/
      - Indexer__ApiPageSize=100
      - Indexer__ApiRequestDelayMs=50
      - Indexer__IntervalSeconds=120
      - Embeddings__Provider=voyage
      - Embeddings__Model=voyage-3-large
      - Claude__Model=claude-sonnet-4-6
      # Required — supply at deploy time
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - ./data:/data
    networks: [acp-metabot]
    # No ports published — only the sidecar talks to it.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  acp-metabot-acp:
    build:
      context: ./acp-v2
    container_name: acp-metabot-acp
    restart: unless-stopped
    depends_on:
      acp-metabot-api:
        condition: service_healthy
    env_file: ./acp-v2/.env
    environment:
      - ACP_METABOT_API_URL=http://acp-metabot-api:5000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    networks: [acp-metabot]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # Public HTTPS gateway. Terminates TLS via Let's Encrypt, reverse-proxies to
  # the C# API's /v1/* endpoints (rate-limited, no X-API-Key). Set
  # ACP_METABOT_DOMAIN=api.your-domain.tld in the root .env to activate;
  # without it Caddy falls back to a localhost cert and is silent.
  acp-metabot-caddy:
    image: caddy:2-alpine
    container_name: acp-metabot-caddy
    restart: unless-stopped
    depends_on:
      acp-metabot-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - ACP_METABOT_DOMAIN=${ACP_METABOT_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [acp-metabot]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  acp-metabot:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
